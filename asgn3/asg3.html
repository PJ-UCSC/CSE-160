<!DOCTYPE html>
<html>
<body onload="main()">
    <div id="game-ui" style="position: relative; width: 600px; height: 600px;">
        <canvas id="webgl" width="600" height="600" style="background-color: black; cursor: crosshair;"></canvas>
        
        <!-- Game Over Overlay -->
        <div id="game-over" style="display: none; position: absolute; top: 0; left: 0; width: 600px; height: 600px; background: black; color: red; flex-direction: column; justify-content: center; align-items: center; font-family: 'Courier New', Courier, monospace; z-index: 10;">
            <h1 style="font-size: 60px;">GAME OVER</h1>
            <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; background: #333; color: white; border: 1px solid red;">RESPAWN</button>
        </div>

        <!-- Health Bar -->
        <div style="position: absolute; bottom: 20px; left: 20px; width: 200px; height: 20px; border: 2px solid white; background: #333;">
            <div id="hp-bar" style="width: 100%; height: 100%; background: red; transition: width 0.1s;"></div>
        </div>
    </div>

    <div style="margin-top: 20px;">
    </div>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
