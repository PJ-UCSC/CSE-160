<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body onload="main()">
    <div id="game-ui" style="position: relative; width: 600px; height: 600px; margin: auto;">
        <canvas id="webgl" width="600" height="600" style="background-color: black; cursor: crosshair;"></canvas>

        <!-- FPS Counter -->
        <div id="fps-counter" style="position: absolute; top: 10px; left: 10px; color: yellow; font-family: monospace; font-size: 18px; text-shadow: 2px 2px black; z-index: 5;">FPS: 0</div>
        
        <!-- Main Menu -->
        <div id="main-menu" style="display: flex; position: absolute; top: 0; left: 0; width: 600px; height: 600px; background: rgba(0,0,0,0.85); color: #00ff00; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; font-family: sans-serif;">
            <h1>MAIN MENU</h1>
            <p>The zombies are attacking! Try to survive the three waves</p>
            <button onclick="startGame()" style="padding: 10px 20px; cursor: pointer;">START GAME</button>
        </div>

        <!-- Wave Counter -->
        <div id="wave-display" style="position: absolute; top: 10px; right: 10px; color: white; font-family: monospace; font-size: 20px; text-shadow: 2px 2px black;">WAVE: 1</div>

        <!-- Game Over Overlay -->
        <div id="game-over" style="display: none; position: absolute; top: 0; left: 0; width: 600px; height: 600px; background: black; color: red; flex-direction: column; justify-content: center; align-items: center; z-index: 10; font-family: sans-serif;">
            <h1 style="font-size: 50px;">GAME OVER</h1>
            <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">RESPAWN</button>
        </div>

        <!-- Congratulations Overlay -->
        <div id="congrats" style="display: none; position: absolute; top: 0; left: 0; width: 600px; height: 600px; background: rgba(0,0,0,0.85); color: #00ff00; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; font-family: sans-serif;">
            <h1>VICTORY!</h1>
            <p>The zombies have been defeated.</p>
            <button onclick="restartWaves()" style="margin-bottom: 10px; width: 150px; cursor: pointer;">RESTART WAVES</button>
            <button onclick="stayInWorld()" style="width: 150px; cursor: pointer;">STAY AND BUILD</button>
        </div>

        <!-- Health Bar -->
        <div style="position: absolute; bottom: 20px; left: 20px; width: 200px; height: 20px; border: 2px solid white; background: #333;">
            <div id="hp-bar" style="width: 100%; height: 100%; background: #ff0000; transition: width 0.2s;"></div>
        </div>
    </div>

    <div class="caption">Z to place block, X deletes a block from the top of the stack</div>
    <div class="caption">W is Up, A is Left, S is Down, D is Right</div>
    <div class="caption">Left Click attacks zombies</div>

    <div style="text-align: center; margin-top: 1.5em;">
        <div>
            <div>Light Position</div>
            <div>
                <label>X 
                    <input type="range" id="lightX" min="0" max="31" step="1" value="0" onchange="updateLightPositionX(this.value)">
                    <input type="number" id="lightX-input" onchange="updateLightPositionX(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
            <div>
                <label>Y 
                    <input type="range" id="lightY" min="0" max="3" step="1" value="0" onchange="updateLightPositionY(this.value)">
                    <input type="number" id="lightY-input" onchange="updateLightPositionY(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
            <div>
                <label>Z 
                    <input type="range" id="lightZ" min="0" max="31" step="1" value="0" onchange="updateLightPositionZ(this.value)">
                    <input type="number" id="lightZ-input" onchange="updateLightPositionZ(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
        </div>
        <div>
            <label>R <input type="range" id="lightR" min="0" max="1" step="0.02" value="1"></label>
            <label>G <input type="range" id="lightG" min="0" max="1" step="0.02" value="1"></label>
            <label>B <input type="range" id="lightB" min="0" max="1" step="0.02" value="1"></label>
            <input type="color" id="light-color-picker" value="#ffffff" onchange="updateLightColor(this.value)" style="cursor: pointer;">
        </div>
        <div style="text-align: center; margin-top: 1.5em;">
            <button id="toggle-normals-btn" type="button" onclick="toggleShowNormals()" style="padding: 8px 16px; cursor: pointer;">Show Normals: OFF</button>
            <button id="toggle-diffuse-btn" type="button" onclick="toggleShowDiffuse()" style="padding: 8px 16px; cursor: pointer;">Show Diffuse: ON</button>
        </div>
    </div>

    <!-- Load Libraries -->
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
