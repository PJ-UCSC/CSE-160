<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body onload="main()">
    <div id="game-ui" style="position: relative; width: 600px; height: 600px; margin: auto;">
        <canvas id="webgl" width="600" height="600" style="background-color: black; cursor: crosshair;"></canvas>

        <!-- FPS Counter -->
        <div id="fps-counter" style="position: absolute; top: 10px; left: 10px; color: yellow; font-family: monospace; font-size: 18px; text-shadow: 2px 2px black; z-index: 5;">FPS: 0</div>

    </div>

    <div class="caption">Z to place block, X deletes a block from the top of the stack</div>
    <div class="caption">W is Up, A is Left, S is Down, D is Right</div>
    <div class="caption">R pans up and F pans down</div>
    <div class="caption">I loaded a houseplant into the world</div>

    <div style="text-align: center; margin-top: 1.5em;">
        <div>
            <div>Light Position</div>
            <div>
                <label>X 
                    <input type="range" id="lightX" min="0" max="31" step="1" value="0" onchange="updateLightPositionX(this.value)">
                    <input type="number" id="lightX-input" onchange="updateLightPositionX(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
            <div>
                <label>Y 
                    <input type="range" id="lightY" min="0" max="3" step="1" value="0" onchange="updateLightPositionY(this.value)">
                    <input type="number" id="lightY-input" onchange="updateLightPositionY(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
            <div>
                <label>Z 
                    <input type="range" id="lightZ" min="0" max="31" step="1" value="0" onchange="updateLightPositionZ(this.value)">
                    <input type="number" id="lightZ-input" onchange="updateLightPositionZ(this.value)" style="cursor: pointer;" value="0">
                </label>
            </div>
        </div>
        <div>
            <label>R <input type="range" id="lightR" min="0" max="1" step="0.02" value="1"></label>
            <label>G <input type="range" id="lightG" min="0" max="1" step="0.02" value="1"></label>
            <label>B <input type="range" id="lightB" min="0" max="1" step="0.02" value="1"></label>
            <input type="color" id="light-color-picker" value="#ffffff" onchange="updateLightColor(this.value)" style="cursor: pointer;">
        </div>
        <label>Spotlight Color: 
            <input type="color" id="spot-color-picker" value="#ff0000" oninput="updateSpotlightColor(this.value)">
        </label>
        <div style="text-align: center; margin-top: 1.5em;">
            <button id="toggle-normals-btn" type="button" onclick="toggleShowNormals()" style="padding: 8px 16px; cursor: pointer;">Show Normals: OFF</button>
            <button id="toggle-diffuse-btn" type="button" onclick="toggleShowDiffuse()" style="padding: 8px 16px; cursor: pointer;">Show Diffuse: ON</button>
        </div>
        <button id="toggle-spotlight-btn" type="button" onclick="toggleSpotlight()">Spotlight: ON</button>
        <script>
            function toggleSpotlight() {
                g_spotlightOn = !g_spotlightOn;
                document.getElementById('toggle-spotlight-btn').textContent = g_spotlightOn ? 'Spotlight: ON' : 'Spotlight: OFF';
            }
        </script>
    </div>

    <!-- Load Libraries -->
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/model.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
